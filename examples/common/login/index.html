<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PeerBox</title>
  <link rel="stylesheet" href ="login.css">
</head>
<body>
  <div class="peerbox-icon-background" id=""></div>
  <h1 class="pb-bubbles-title">PeerBox</h1>
  <img id = "svg" src="peerbox.svg"></img>
  <!-- Join Form -->
  <form id="joinForm" class="pb-bubbles-chat-join-form">
    <label for="roomId">Room ID</label>
    <input type="text" class="pb-bubbles-form-input" id="roomId" maxlength="6" placeholder="Enter room id" required />
    <label for="username">Username</label>
    <input type="text" class="pb-bubbles-form-input" id="username" placeholder="Enter username" required />
    <button class="pb-bubbles-button" type="submit" id="submit">Join</button>
  </form>

  <script type="module" src="login.js"></script>
</body>
</html>
