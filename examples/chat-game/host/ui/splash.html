<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap');

    :root {
      --primary-color: #ecafff !important;
      --secondary-color: #c27ab0 !important;
      --secondary-color-2: #493e8f !important;
      --background-color: #541e6d !important;
      --background-color-2: #27214d !important;
      --text-color: #faf6e7 !important;
      --font-family: 'Cherry Bomb One', Arial, sans-serif !important;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI", Roboto, sans-serif;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
    }

    #container {
      background: none;
      border-radius: 16px;
      padding: 32px 48px;
      min-width: 320px;
      text-align: center;
      color: #fff;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    #logo {
      width: 248px;
      height: 248px;
      margin-bottom: 0%;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    #status {
      font-size: 1.1rem;
      margin-top: 0px;
      color: #d0d0d0;
    }

    #progress-container {
      margin-top: 12px;
      background: none;
      border-radius: 8px;
      height: 8px;
      width: 100%;
      overflow: hidden;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      transition: width 0.2s ease;
    }

    #title {
      font-family: var(--font-family);
      color: var(--primary-color);
      font-size: 5rem;
      margin:0;
      text-align: center;
      text-shadow: 
          0 1px 0 var(--secondary-color),
          0 2px 0 var(--secondary-color),
          0 3px 0 var(--secondary-color),
          0 4px 0 var(--secondary-color),
          0 5px 0 var(--secondary-color),
          0 6px 0 var(--secondary-color),
          0 7px 0 var(--secondary-color),
          0 8px 0 var(--secondary-color),
          0 0 5px rgba(10, 0, 0, .05),
          0 1px 3px rgba(10, 0, 0, .2),
          0 3px 5px rgba(10, 0, 0, .2),
          0 5px 10px rgba(10, 0, 0, .2),
          0 10px 10px rgba(10, 0, 0, .2),
          0 20px 20px rgba(10, 0, 0, .3);
    }

  </style>
</head>
<body>
  <div id="container">
    <img id="logo" src="../../../../framework/dist/peerbox.svg" alt="App Logo" />
    <h2 id="title">Peerbox</h2>
    <div id="status">Initializing...</div>

    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>
  </div>

    <script>
    // Update the status text
    function setStatus(text) {
        const el = document.getElementById("status");
        if (el) el.textContent = text;
    }

    // Show or hide the progress bar
    function showProgress(show) {
        const container = document.getElementById("progress-container");
        if (container) container.style.display = show ? "block" : "none";
    }

    // Update progress bar width (clamped 0–100)
    function setProgress(value) {
        const bar = document.getElementById("progress-bar");
        if (!bar) return;
        const clamped = Math.max(0, Math.min(100, value));
        bar.style.width = clamped + "%";
    }

    // Fade out splash screen and close window
    function fadeOut() {
        document.body.style.transition = "opacity 0.6s";
        document.body.style.opacity = "0";
        setTimeout(() => window.close(), 600);
    }

    // Expose functions to main via contextBridge
    window.splashAPI = {
        setStatus,
        showProgress,
        setProgress,
        onFadeOut: (callback) => {
        window.addEventListener("splash-fade-out", callback);
        },
    };

    console.log(  window.api)
    console.log(window.env)

    // Listen for main process events
    window.addEventListener("DOMContentLoaded", () => {
        window.api?.on("splash-set-status", (_e, text) => setStatus(text));
        window.api?.on("splash-show-progress", (_e, show) => showProgress(show));
        window.api?.on("splash-loading-progress", (_e, value) => setProgress(value));
        window.api?.on("splash-fade-out", fadeOut);
    });
    </script>
</body>
</html>
