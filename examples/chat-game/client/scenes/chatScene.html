<!-- /scenes/chatScene.html -->
<div id="chatScene" class="pb-bubbles-scene" style="position:relative; width:100%; height:100%;display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    grid-column-gap: 20px;
    grid-row-gap: 20px;">
  <span style=" grid-area: 1 / 1 / 2 / 3; "></span>
  <div class="pb-bubbles-chat-container" style="margin-left:20px; grid-area: 2 / 1 / 3 / 2; ">
    <!-- Messages -->
    <div id="chatBox" class="pb-bubbles-chat-messages"></div>

    <!-- Chat Form -->
    <form id="chatForm" class="pb-bubbles-chat-form">
      <input
        type="text"
        class="pb-bubbles-chat-input"
        id="chatInput"
        placeholder="Type message..."
        autocomplete="off"
      />
      <button type="submit" class="pb-bubbles-chat-submit">Send</button>
    </form>

  </div>

  <button id = "settings" class= "pb-bubbles-button" style="position: absolute;right:10px;top:40px;">
    <img src="assets/cog.svg" alt="Settings" />
  </button>
  <!-- User List -->
  <div id="userlistwrapper" class="pb-bubbles-user-list-container" style="grid-area: 2 / 2 / 3 / 3; ">
    <ul id="userList" class="pb-bubbles-user-list"></ul>
  </div>
</div>
